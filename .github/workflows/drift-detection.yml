name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

concurrency:
  group: drift-detection-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-detection:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./infra/live

    env:
      AWS_REGION: us-east-1
      TF_IN_AUTOMATION: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ./infra/live/.terraform/providers
          key: terraform-plugins-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-plugins-${{ runner.os }}-

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_CI_INFRA }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init & Validate
        run: |
          terraform init -input=false
          terraform validate -no-color

      - name: Terraform Plan (Drift Detection)
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color -out=tfplan > /dev/null
          exit_code=$?
          set -e
          echo "exitcode=$exit_code" >> $GITHUB_OUTPUT

      - name: Publish Drift Summary
        if: always()
        run: |
          timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          run_link="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          echo "## Terraform Drift Detection" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Timestamp: ${timestamp}" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.plan.outputs.exitcode }}" = "2" ]; then
            echo "- Status: Drift detected" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.plan.outputs.exitcode }}" = "0" ]; then
            echo "- Status: No drift detected" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Status: Drift check failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "- Run: ${run_link}" >> "$GITHUB_STEP_SUMMARY"

      - name: Manage Drift Issue (Create/Comment/Resolve)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const exitCode = "${{ steps.plan.outputs.exitcode }}";
            const formattedDate = new Intl.DateTimeFormat('pt-BR', {
              timeZone: 'America/Sao_Paulo',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit'
            }).format(new Date());
            const runLink = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift'
            });

            const existingIssue = issues.find(i => i.title.includes('Infrastructure Drift Detected'));

            if (exitCode === '2') {
              if (!existingIssue) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: '🚨 Infrastructure Drift Detected',
                  labels: ['drift', 'terraform', 'bug'],
                  body: `Drift detectado.\n\n- Timestamp: ${formattedDate}\n- Status: Drift detected\n- Run: [${context.runId}](${runLink})`
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  body: `⚠️ Drift still detected.\n\n- Timestamp: ${formattedDate}\n- Status: Drift detected\n- Run: [${context.runId}](${runLink})`
                });
              }
            } else if (exitCode === '0' && existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `✅ Drift resolved.\n\n- Timestamp: ${formattedDate}\n- Status: No drift detected\n- Run: [${context.runId}](${runLink})`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                state: 'closed'
              });
            }

      - name: Final Status Check
        run: |
          if [ "${{ steps.plan.outputs.exitcode }}" -eq "1" ]; then exit 1; fi
          if [ "${{ steps.plan.outputs.exitcode }}" -eq "2" ]; then
            echo "Drift detectado. Ação necessária: investigar e reconciliar o estado via Terraform."
            exit 1
          fi

      - name: Cleanup Terraform Transient Files
        if: always()
        run: rm -f tfplan
