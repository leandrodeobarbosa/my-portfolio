name: CI - Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate-infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/environments/production

    env:
      AWS_REGION: us-east-1
      TF_IN_AUTOMATION: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ./infra/environments/production/.terraform/providers
          key: terraform-plugins-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-plugins-${{ runner.os }}-

      - name: Terraform Format Check
        working-directory: ./infra/environments/production
        run: terraform fmt -check -recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{vars.AWS_ROLE_ARN_CI_INFRA}}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan -no-color -input=false
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 1 ]; then
            echo "Terraform plan failed with errors"
            exit 1
          fi
          exit 0

      - name: Debug ACM Resource Change
        if: steps.plan.outputs.exit_code != '1'
        run: |
          set -euo pipefail

          result=$(terraform show -json tfplan | jq '
            .resource_changes[]?
            | select(.address == "module.site_stack.aws_acm_certificate.portfolio_certificate")
            | {
                address,
                actions: .change.actions,
                before: .change.before,
                after: .change.after,
                after_unknown: .change.after_unknown
              }
          ')

          if [ -z "$result" ] || [ "$result" = "null" ]; then
            echo "Target resource not present in tfplan"
          else
            echo "$result"
          fi

      - name: Calculate Plan Metrics
        id: build-plan
        if: steps.plan.outputs.exit_code != '1'
        run: |
          # terraform show -json must not be persisted or printed; only aggregate metrics are derived for a safe PR comment.
          set +x
          set -euo pipefail

          add=$(terraform show -json tfplan | jq '[.resource_changes[]? | select(.change.actions | contains(["create"]))] | length')
          change=$(terraform show -json tfplan | jq '[.resource_changes[]? | select(.change.actions | contains(["update"]))] | length')
          destroy=$(terraform show -json tfplan | jq '[.resource_changes[]? | select(.change.actions | contains(["delete"]))] | length')

          add=${add:-0}
          change=${change:-0}
          destroy=${destroy:-0}

          echo "add=$add" >> "$GITHUB_OUTPUT"
          echo "change=$change" >> "$GITHUB_OUTPUT"
          echo "destroy=$destroy" >> "$GITHUB_OUTPUT"

      - name: Comment Terraform Plan on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const COMMENT_MARKER = '<!-- terraform-plan-comment -->';
            const exitCode = parseInt('${{ steps.plan.outputs.exit_code }}') || 0;
            const add = parseInt('${{ steps.build-plan.outputs.add }}') || 0;
            const change = parseInt('${{ steps.build-plan.outputs.change }}') || 0;
            const destroy = parseInt('${{ steps.build-plan.outputs.destroy }}') || 0;
            const hasChanges = add > 0 || change > 0 || destroy > 0;
            const formattedDate = new Intl.DateTimeFormat('pt-BR', {
            timeZone: 'America/Sao_Paulo',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
            }).format(new Date());

            // Determine status based on exit code AND actual changes
            let statusMessage;
            let statusEmoji;
            if (exitCode === 1) {
              statusMessage = 'Plan failed with errors';
              statusEmoji = '❌';
            } else if (hasChanges) {
              statusMessage = 'Changes detected';
              statusEmoji = '⚠️';
            } else {
              statusMessage = 'No changes detected';
              statusEmoji = '✅';
            }

            // Build the comment body
            let body = COMMENT_MARKER + '\n';
            body += `🔄 **Última atualização:** ${formattedDate} (horário de Brasília) \n`;
            body += `## ${statusEmoji} Terraform Plan Result\n\n`;
            body += `**Status:** ${statusMessage}\n\n`;

            if (exitCode === 0 || exitCode === 2) {
              body += '### Resumo das Alterações\n';
              body += `| 🟢 Adicionar | 🟡 Alterar | 🔴 Destruir |\n`;
              body += `| :--- | :--- | :--- |\n`; // Adicionei alinhamento para o Markdown ficar bonito
              body += `| ${add} | ${change} | ${destroy} |\n\n`;

            if (destroy > 0) {
              body += '> [!CAUTION]\n';
              body += '> ⚠️ **Atenção:** Este plano inclui a **DESTRUIÇÃO** de recursos. Revise com cuidado extremo.\n\n';
            }
            } else if (exitCode === 1) {
              body += '> [!IMPORTANT]\n';
              body += '> ❌ **O Terraform Plan falhou.** Verifique os logs do workflow para detalhes do erro.\n';
            }

            body += '\n---\n';
            body += `*Workflow: \`${context.workflow}\` | Run ID: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;


            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: owner,
              repo: repo,
              issue_number: issue_number
            });

            const existingComment = comments.find(comment =>
              comment.body && comment.body.includes(COMMENT_MARKER)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: owner,
                repo: repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issue_number,
                body: body
              });
            }

      - name: Cleanup Terraform Transient Files
        if: always()
        run: rm -f tfplan
