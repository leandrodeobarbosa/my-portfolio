name: CD - Application

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "!app/**/*.md"

concurrency:
  group: cd-app-${{github.ref_name}}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-app:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "./app/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality Checks
        run: |
          pnpm lint
          pnpm check

      - name: Build Astro App
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync Assets to S3
        run: |
          aws s3 sync ./dist/_astro s3://${{ vars.BUCKET_NAME }}/_astro \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML and Public Files
        run: |
          aws s3 sync ./dist s3://${{ vars.BUCKET_NAME }} \
            --exclude "_astro/*" \
            --delete \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment Summary
        run: |
          echo "### 🚀 App Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "A versão mais recente da aplicação foi sincronizada e o cache do CloudFront foi invalidado." >> $GITHUB_STEP_SUMMARY
