name: CD - Staging

on:
  push:
    branches: [main]

concurrency:
  group: cd-staging-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.detect.outputs.app_changed }}
      infra_changed: ${{ steps.detect.outputs.infra_changed }}
      cv_changed: ${{ steps.detect.outputs.cv_changed }}
      deploy_needed: ${{ steps.detect.outputs.deploy_needed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deploy scope
        id: detect
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          changed_files="$(mktemp)"

          if git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            git diff --name-only "$BEFORE_SHA" "$HEAD_SHA" > "$changed_files"
          else
            git diff-tree --no-commit-id --name-only -r "$HEAD_SHA" > "$changed_files"
          fi

          detect_path() {
            local pattern="$1"
            if grep -Eq "$pattern" "$changed_files"; then
              echo "true"
            else
              echo "false"
            fi
          }

          app_changed="$(detect_path '^app/')"
          infra_changed="$(detect_path '^infra/')"
          cv_changed="$(detect_path '^app/public/cv/')"

          deploy_needed="false"
          if [ "$app_changed" = "true" ] || [ "$infra_changed" = "true" ] || [ "$cv_changed" = "true" ]; then
            deploy_needed="true"
          fi

          {
            echo "app_changed=$app_changed"
            echo "infra_changed=$infra_changed"
            echo "cv_changed=$cv_changed"
            echo "deploy_needed=$deploy_needed"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Staging Deploy Scope"
            echo ""
            echo "- App: $app_changed"
            echo "- Infra: $infra_changed"
            echo "- CV: $cv_changed"
            echo "- Deploy needed: $deploy_needed"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-infra-staging:
    name: Deploy Infra Staging
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra_changed == 'true'
    environment: staging
    defaults:
      run:
        working-directory: ./infra/environments/staging
    env:
      AWS_REGION: us-east-1
      TF_IN_AUTOMATION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ./infra/environments/staging/.terraform/providers
          key: terraform-staging-plugins-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-staging-plugins-${{ runner.os }}-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_INFRA_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan -no-color -input=false
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 1 ]; then
            echo "Terraform plan failed with errors"
            exit 1
          fi
          exit 0

      - name: Apply Terraform
        if: steps.plan.outputs.exit_code == '2'
        run: terraform apply -input=false -no-color tfplan

      - name: No infrastructure changes
        if: steps.plan.outputs.exit_code == '0'
        run: echo "No staging infrastructure changes to apply."

      - name: Cleanup Terraform transient files
        if: always()
        run: rm -f tfplan

  deploy-app-staging:
    name: Deploy App Staging
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - deploy-infra-staging
    if: always() && needs.detect-changes.outputs.app_changed == 'true' && (needs.deploy-infra-staging.result == 'success' || needs.deploy-infra-staging.result == 'skipped')
    environment: staging
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "./app/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality Checks
        run: |
          pnpm lint
          pnpm check

      - name: Build Astro App
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync Assets to S3
        run: |
          aws s3 sync ./dist/_astro s3://${{ vars.BUCKET_NAME }}/_astro \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML and Public Files
        run: |
          aws s3 sync ./dist s3://${{ vars.BUCKET_NAME }} \
            --exclude "_astro/*" \
            --exclude "cv/*" \
            --delete \
            --cache-control "public, max-age=60, stale-while-revalidate=604800"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-cv-staging:
    name: Deploy CV Staging
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - deploy-infra-staging
      - deploy-app-staging
    if: always() && needs.detect-changes.outputs.cv_changed == 'true' && (needs.deploy-infra-staging.result == 'success' || needs.deploy-infra-staging.result == 'skipped') && needs.deploy-app-staging.result == 'success'
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy CV
        uses: ./.github/actions/cv-to-s3
        with:
          cv_dir: app/public/cv
          cv_file: Leandro-Barbosa-DevOps-CV.pdf
          bucket: ${{ vars.BUCKET_NAME }}

  staging-deploy-result:
    name: Staging Deploy Result
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - deploy-infra-staging
      - deploy-app-staging
      - deploy-cv-staging
    if: always()
    steps:
      - name: Evaluate staging deploy result
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          DEPLOY_NEEDED: ${{ needs.detect-changes.outputs.deploy_needed }}
        run: |
          set -euo pipefail

          failed_jobs="$(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key')"

          {
            echo "## Staging Deployment"
            echo ""
            echo "- Production workflows are intentionally unchanged in this branch."
            echo "- Production deploys remain governed by the existing GitHub Environment approval."
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$failed_jobs" ]; then
            echo "Staging deploy failed. Failed or cancelled jobs:"
            echo "$failed_jobs"
            exit 1
          fi

          if [ "$DEPLOY_NEEDED" != "true" ]; then
            echo "No app, infra, or CV changes detected for staging deploy."
            exit 0
          fi

          echo "Staging deploy completed."
